<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ASTROCATCH — physics edition</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ─── HUD layer ─── */
  /* pointer-events: none lets taps pass through the HUD to the
    canvas; specific overlays re-enable interactivity below. */
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  #ui * {
    pointer-events: none;
  }

  #score-display {
    position: absolute;
    top: env(safe-area-inset-top, 20px);
    left: 0;
    right: 0;
    text-align: center;
    padding-top: 20px;
  }

  #score {
    font-size: 62px;
    font-weight: 750;
    letter-spacing: -1.6px;
    text-shadow: 0 0 34px rgba(140, 210, 255, 0.55);
    transition: transform 0.12s;
  }

  #sub {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #hint {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 13px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.4s;
  }

  #hint.on {
    opacity: 1;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.85; }
  }

  /* ─── Modal overlays (start screen, pause, game over) ─── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 18, 0.88);
    backdrop-filter: blur(16px);
    transition: opacity 0.35s;
    pointer-events: auto;
  }

  /* The game-over overlay is much more transparent so the looping
    replay animation behind it stays visible while the AGAIN button
    sits in the foreground. */
  #gameover {
    background: rgba(10, 10, 18, 0.55);
    backdrop-filter: blur(6px);
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none !important;
  }

  /* Re-enable taps on overlay contents (which sit inside the
    pointer-events:none HUD), but only when the overlay is shown. */
  #ui .overlay,
  #ui .overlay * {
    pointer-events: auto;
  }

  #ui .overlay.hidden,
  #ui .overlay.hidden * {
    pointer-events: none !important;
  }

  /* ─── Typography ─── */
  h1 {
    font-size: 56px;
    font-weight: 750;
    background: linear-gradient(115deg, #ffaa3c, #fa6db0, #58e0fb);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1.8px;
  }

  .tag {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .desc {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.55);
    max-width: 340px;
    text-align: center;
    margin-top: 22px;
    line-height: 1.65;
  }

  .desc b {
    color: rgba(255, 255, 255, 0.85);
    font-weight: 600;
  }

  /* ─── Buttons ─── */
  button {
    border: none;
    background: linear-gradient(115deg, #fa6db0, #ffaa3c);
    color: #fff;
    font-family: inherit;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1.8px;
    padding: 15px 52px;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 28px;
    box-shadow: 0 0 34px rgba(250, 109, 176, 0.32);
    transition: transform 0.1s;
  }

  button:active {
    transform: scale(0.96);
  }

  /* ─── Game-over score ─── */
  #final {
    font-size: 88px;
    font-weight: 750;
    background: linear-gradient(125deg, #fa6db0, #ffaa3c, #58e0fb);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -3.4px;
    line-height: 1;
  }

  .label {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score-display" style="display:none"><div id="score">0</div><div id="sub">best 0 · 0 stars</div></div>
  <div id="hint">tap to boost</div>

  <div id="start" class="overlay">
    <h1>ASTROCATCH</h1>
    <div class="tag">one tap · real gravity</div>
    <div class="desc">You're orbiting a star. <b>Tap</b> when your direction aims at the next one. The game picks a boost; gravity bends the path and captures you on the other side. Release within one rotation for bonus points.</div>
    <button id="start-btn">BEGIN</button>
  </div>

  <div id="gameover" class="overlay hidden">
    <div class="label">game over</div>
    <div id="final">0</div>
    <div class="label"><span id="stars">0</span> stars · best <span id="best">0</span></div>
    <button id="retry-btn">AGAIN</button>
  </div>
</div>

<script type="module" src="gameplay.js"></script>
</body>
</html>
